name: Deploy to GitHub Pages

# Деплоит статический сайт на GitHub Pages при каждом пуше в main.
# В настройках репозитория: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем один параллельный деплой, отменяя предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # весь репозиторий — это статический сайт
      - id: deployment
        uses: actions/deploy-pages@v4
